name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        run: |
          uv sync --all-groups --extra report

      - name: Run Ruff linter
        run: |
          uv run ruff check src/ tests/
      
      - name: Run Ruff formatter check
        run: |
          uv run ruff format --check src/ tests/

  test:
    name: Test with pytest
    runs-on: ubuntu-latest
    env:
      GIST_SECRET: ${{ secrets.GIST_SECRET }}
      GIST_ID: ${{ secrets.GIST_ID }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        run: |
          uv sync --all-groups --extra report

      - name: Run pytest with coverage
        run: |
          uv run pytest --cov=arandu --cov-report=term-missing --cov-report=json --cov-fail-under=75
      
      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          if [ -f coverage.json ]; then
            # Use floor division to avoid showing higher percentage than actual
            COVERAGE=$(python -c "import json; import math; print(math.floor(json.load(open('coverage.json'))['totals']['percent_covered']))")
            echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Coverage: $COVERAGE%"
          else
            echo "percentage=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Count tests
        if: always()
        id: tests
        run: |
          # Extract test count from pytest output (handles both 'test' and 'tests')
          TESTS=$(uv run pytest --collect-only -q 2>&1 | tail -1 | grep -oE '[0-9]+ tests?' | grep -oE '[0-9]+' || echo "0")
          echo "count=$TESTS" >> $GITHUB_OUTPUT
          echo "Tests: $TESTS"
      
      - name: Create Coverage Badge
        # Only update badges on main branch and only if secrets are configured
        if: github.ref == 'refs/heads/main' && always() && env.GIST_SECRET != '' && env.GIST_ID != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          maxColorRange: 100
          minColorRange: 0

      - name: Create Tests Badge
        # Only update badges on main branch and only if secrets are configured
        if: github.ref == 'refs/heads/main' && always() && env.GIST_SECRET != '' && env.GIST_ID != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: tests-badge.json
          label: tests
          message: ${{ steps.tests.outputs.count }} passing
          color: brightgreen
