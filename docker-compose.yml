services:
  gtranscriber:
    build:
      context: .
      dockerfile: Dockerfile
    image: gtranscriber:latest
    container_name: gtranscriber-${SLURM_JOB_ID:-local}

    # GPU support - NVIDIA runtime
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Environment variables
    environment:
      - GTRANSCRIBER_MODEL_ID=${GTRANSCRIBER_MODEL_ID:-openai/whisper-large-v3-turbo}
      - GTRANSCRIBER_QUANTIZE=${GTRANSCRIBER_QUANTIZE:-false}
      - GTRANSCRIBER_FORCE_CPU=${GTRANSCRIBER_FORCE_CPU:-false}
      - GTRANSCRIBER_CREDENTIALS=/app/credentials/credentials.json
      - GTRANSCRIBER_TOKEN=/app/credentials/token.json
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    # Volume mounts
    volumes:
      # Input catalog
      - ${GTRANSCRIBER_INPUT_DIR:-${INPUT_DIR:-./input}}:/app/input:ro
      # Output results
      - ${GTRANSCRIBER_RESULTS_DIR:-${RESULTS_DIR:-./results}}:/app/results:rw
      # Google Drive credentials
      - ${GTRANSCRIBER_CREDENTIALS_DIR:-${CREDENTIALS_DIR:-./}}:/app/credentials:rw
      # Hugging Face cache (persistent model storage)
      - ${GTRANSCRIBER_HF_CACHE_DIR:-${HF_CACHE_DIR:-./cache/huggingface}}:/app/.cache/huggingface:rw

    # Working directory
    working_dir: /app

    # Default command for batch transcription
    command: >
      batch-transcribe
      /app/input/${GTRANSCRIBER_CATALOG_FILE:-${CATALOG_FILE:-catalog.csv}}
      --credentials /app/credentials/credentials.json
      --token /app/credentials/token.json
      --output-dir /app/results
      --workers ${GTRANSCRIBER_WORKERS:-${WORKERS:-4}}

    # Resource limits (adjust based on partition)
    shm_size: '16gb'

    # Restart policy (useful for long-running jobs)
    restart: "no"

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    # Profiles - prevent this GPU service from running with other profiles
    profiles:
      - transcribe
      - gpu

  # CPU-only variant
  gtranscriber-cpu:
    extends:
      service: gtranscriber
    container_name: gtranscriber-cpu-${SLURM_JOB_ID:-local}

    # Remove GPU reservation for CPU-only execution
    deploy:
      resources: {}

    environment:
      - GTRANSCRIBER_MODEL_ID=${GTRANSCRIBER_MODEL_ID:-distil-whisper/distil-large-v3}
      - GTRANSCRIBER_QUANTIZE=false
      - GTRANSCRIBER_FORCE_CPU=true
      - GTRANSCRIBER_CREDENTIALS=/app/credentials/credentials.json
      - GTRANSCRIBER_TOKEN=/app/credentials/token.json
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    command: >
      batch-transcribe
      /app/input/${GTRANSCRIBER_CATALOG_FILE:-${CATALOG_FILE:-catalog.csv}}
      --credentials /app/credentials/credentials.json
      --token /app/credentials/token.json
      --output-dir /app/results
      --workers ${GTRANSCRIBER_WORKERS:-${WORKERS:-2}}
      --cpu

    profiles:
      - cpu

  # AMD GPU variant (ROCm)
  gtranscriber-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    image: gtranscriber:rocm
    container_name: gtranscriber-rocm-${SLURM_JOB_ID:-local}

    # AMD GPU device access
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render

    # Environment variables
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - GTRANSCRIBER_MODEL_ID=${GTRANSCRIBER_MODEL_ID:-openai/whisper-large-v3-turbo}
      - GTRANSCRIBER_QUANTIZE=false
      - GTRANSCRIBER_FORCE_CPU=false
      - GTRANSCRIBER_CREDENTIALS=/app/credentials/credentials.json
      - GTRANSCRIBER_TOKEN=/app/credentials/token.json
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    # Volume mounts
    volumes:
      - ${GTRANSCRIBER_INPUT_DIR:-${INPUT_DIR:-./input}}:/app/input:ro
      - ${GTRANSCRIBER_RESULTS_DIR:-${RESULTS_DIR:-./results}}:/app/results:rw
      - ${GTRANSCRIBER_CREDENTIALS_DIR:-${CREDENTIALS_DIR:-./}}:/app/credentials:rw
      - ${GTRANSCRIBER_HF_CACHE_DIR:-${HF_CACHE_DIR:-./cache/huggingface}}:/app/.cache/huggingface:rw

    # Working directory
    working_dir: /app

    # Default command for batch transcription
    command: >
      batch-transcribe
      /app/input/${GTRANSCRIBER_CATALOG_FILE:-${CATALOG_FILE:-catalog.csv}}
      --credentials /app/credentials/credentials.json
      --token /app/credentials/token.json
      --output-dir /app/results
      --workers ${GTRANSCRIBER_WORKERS:-${WORKERS:-3}}

    # Resource limits
    shm_size: '16gb'

    # Restart policy
    restart: "no"

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    profiles:
      - rocm

  # ===========================================================================
  # Knowledge Graph Construction Pipeline Services
  # ===========================================================================

  # Ollama LLM Service (sidecar for QA and KG services)
  # CPU-only by default for maximum compatibility
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-${SLURM_JOB_ID:-local}

    networks:
      default:
        aliases:
          - ollama

    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}

    volumes:
      - ${OLLAMA_MODELS_DIR:-./cache/ollama}:/root/.ollama:rw

    # Note: No host port binding needed - services communicate via internal Docker network
    # This avoids port conflicts when multiple SLURM jobs run on the same node

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    profiles:
      - qa
      - kg
      - cep
      - ollama

  # Ollama with GPU support (use --profile ollama-gpu)
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama-gpu-${SLURM_JOB_ID:-local}

    networks:
      default:
        aliases:
          - ollama

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}

    volumes:
      - ${OLLAMA_MODELS_DIR:-./cache/ollama}:/root/.ollama:rw

    # Note: No host port binding needed - services communicate via internal Docker network
    # This avoids port conflicts when multiple SLURM jobs run on the same node

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    profiles:
      - qa-gpu
      - kg-gpu
      - cep-gpu
      - ollama-gpu

  # QA Generation Service
  gtranscriber-qa:
    build:
      context: .
      dockerfile: Dockerfile
    image: gtranscriber:latest
    container_name: gtranscriber-qa-${SLURM_JOB_ID:-local}
    working_dir: /app

    # No GPU needed (QA generation is CPU/API-based)
    deploy: {}

    # Wait for Ollama to be ready when using Ollama provider
    depends_on:
      ollama:
        condition: service_healthy
        required: false  # Allow running without Ollama (e.g., with OpenAI)

    environment:
      - GTRANSCRIBER_QA_PROVIDER=${GTRANSCRIBER_QA_PROVIDER:-ollama}
      - GTRANSCRIBER_QA_MODEL_ID=${GTRANSCRIBER_QA_MODEL_ID:-qwen3:14b}
      # Use Ollama sidecar service by default, or host.docker.internal for external Ollama
      - GTRANSCRIBER_QA_OLLAMA_URL=${GTRANSCRIBER_QA_OLLAMA_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GTRANSCRIBER_LLM_BASE_URL=${GTRANSCRIBER_LLM_BASE_URL:-}
      - GTRANSCRIBER_QA_QUESTIONS_PER_DOCUMENT=${GTRANSCRIBER_QA_QUESTIONS_PER_DOCUMENT:-10}
      - GTRANSCRIBER_QA_TEMPERATURE=${GTRANSCRIBER_QA_TEMPERATURE:-0.7}
      - GTRANSCRIBER_QA_WORKERS=${GTRANSCRIBER_QA_WORKERS:-2}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    command: >
      generate-qa
      /app/results
      --id ${PIPELINE_ID:-}
      --workers ${GTRANSCRIBER_QA_WORKERS:-2}

    volumes:
      - ${GTRANSCRIBER_RESULTS_DIR:-./results}:/app/results:rw
      - ${GTRANSCRIBER_HF_CACHE_DIR:-./cache/huggingface}:/app/.cache/huggingface:rw

    shm_size: '16gb'
    restart: "no"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    profiles:
      - qa
      - qa-gpu

  # CEP QA Generation Service (Cognitive Elicitation Pipeline)
  gtranscriber-cep:
    build:
      context: .
      dockerfile: Dockerfile
    image: gtranscriber:latest
    container_name: gtranscriber-cep-${SLURM_JOB_ID:-local}
    working_dir: /app

    # No GPU needed (CEP generation is CPU/API-based)
    deploy: {}

    # Wait for Ollama to be ready when using Ollama provider
    depends_on:
      ollama:
        condition: service_healthy
        required: false  # Allow running without Ollama (e.g., with OpenAI)

    environment:
      - GTRANSCRIBER_QA_PROVIDER=${GTRANSCRIBER_QA_PROVIDER:-ollama}
      - GTRANSCRIBER_QA_MODEL_ID=${GTRANSCRIBER_QA_MODEL_ID:-qwen3:14b}
      # Use Ollama sidecar service by default
      - GTRANSCRIBER_QA_OLLAMA_URL=${GTRANSCRIBER_QA_OLLAMA_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GTRANSCRIBER_LLM_BASE_URL=${GTRANSCRIBER_LLM_BASE_URL:-}
      - GTRANSCRIBER_QA_QUESTIONS_PER_DOCUMENT=${GTRANSCRIBER_QA_QUESTIONS_PER_DOCUMENT:-10}
      - GTRANSCRIBER_QA_TEMPERATURE=${GTRANSCRIBER_QA_TEMPERATURE:-0.7}
      - GTRANSCRIBER_QA_WORKERS=${GTRANSCRIBER_QA_WORKERS:-2}
      # CEP-specific configuration
      - GTRANSCRIBER_CEP_ENABLE_VALIDATION=${GTRANSCRIBER_CEP_ENABLE_VALIDATION:-true}
      - GTRANSCRIBER_CEP_VALIDATOR_PROVIDER=${GTRANSCRIBER_CEP_VALIDATOR_PROVIDER:-ollama}
      - GTRANSCRIBER_CEP_VALIDATOR_MODEL_ID=${GTRANSCRIBER_CEP_VALIDATOR_MODEL_ID:-qwen3:14b}
      - GTRANSCRIBER_CEP_LANGUAGE=${GTRANSCRIBER_CEP_LANGUAGE:-pt}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    command: >
      generate-cep-qa
      /app/results
      --id ${PIPELINE_ID:-}
      --workers ${GTRANSCRIBER_QA_WORKERS:-2}

    volumes:
      - ${GTRANSCRIBER_RESULTS_DIR:-./results}:/app/results:rw
      - ${GTRANSCRIBER_HF_CACHE_DIR:-./cache/huggingface}:/app/.cache/huggingface:rw

    shm_size: '16gb'
    restart: "no"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    profiles:
      - cep
      - cep-gpu

  # KG Construction Service
  gtranscriber-kg:
    build:
      context: .
      dockerfile: Dockerfile.kg
    image: gtranscriber-kg:latest
    container_name: gtranscriber-kg-${SLURM_JOB_ID:-local}
    working_dir: /app

    # No GPU needed (KG construction is CPU/API-based)
    deploy: {}

    # Wait for Ollama to be ready when using Ollama provider
    depends_on:
      ollama:
        condition: service_healthy
        required: false  # Allow running without Ollama (e.g., with OpenAI)

    environment:
      - GTRANSCRIBER_KG_PROVIDER=${GTRANSCRIBER_KG_PROVIDER:-ollama}
      - GTRANSCRIBER_KG_MODEL_ID=${GTRANSCRIBER_KG_MODEL_ID:-llama3.1:8b}
      # Use Ollama sidecar service by default, or host.docker.internal for external Ollama
      - GTRANSCRIBER_KG_OLLAMA_URL=${GTRANSCRIBER_KG_OLLAMA_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GTRANSCRIBER_LLM_BASE_URL=${GTRANSCRIBER_LLM_BASE_URL:-}
      - GTRANSCRIBER_KG_BACKEND=${GTRANSCRIBER_KG_BACKEND:-atlas}
      - GTRANSCRIBER_KG_TEMPERATURE=${GTRANSCRIBER_KG_TEMPERATURE:-0.5}
      - GTRANSCRIBER_KG_LANGUAGE=${GTRANSCRIBER_KG_LANGUAGE:-pt}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    command: >
      build-kg
      /app/results
      --id ${PIPELINE_ID:-}

    volumes:
      - ${GTRANSCRIBER_RESULTS_DIR:-./results}:/app/results:rw
      - ${GTRANSCRIBER_HF_CACHE_DIR:-./cache/huggingface}:/app/.cache/huggingface:rw

    shm_size: '16gb'
    restart: "no"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    profiles:
      - kg
      - kg-gpu

  # Evaluation Service
  gtranscriber-eval:
    build:
      context: .
      dockerfile: Dockerfile
    image: gtranscriber:latest
    container_name: gtranscriber-eval-${SLURM_JOB_ID:-local}
    working_dir: /app

    # No GPU needed (evaluation is CPU-based)
    deploy: {}

    environment:
      - GTRANSCRIBER_EVAL_METRICS=${GTRANSCRIBER_EVAL_METRICS:-qa,entity,relation,semantic}
      - GTRANSCRIBER_EVAL_EMBEDDING_MODEL=${GTRANSCRIBER_EVAL_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface/hub

    command: >
      evaluate
      /app/results
      --id ${PIPELINE_ID:-}
      --output /app/evaluation/report.json

    volumes:
      - ${GTRANSCRIBER_RESULTS_DIR:-./results}:/app/results:ro
      - ${GTRANSCRIBER_EVAL_DIR:-./evaluation}:/app/evaluation:rw
      - ${GTRANSCRIBER_HF_CACHE_DIR:-./cache/huggingface}:/app/.cache/huggingface:rw

    shm_size: '16gb'
    restart: "no"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    profiles:
      - evaluate
